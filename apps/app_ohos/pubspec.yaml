name: venera
description: "Venera Comic Reader for HarmonyOS"
publish_to: 'none'
version: 1.1.0+1001000

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  crypto: ^3.0.6
  dio: ^5.4.0
  html: ^0.15.6
  pointycastle: ^4.0.0
  path: ^1.9.0
  mime: ^2.0.0
  uuid: ^4.5.1
  sqlite3: ^2.4.7
  ffi: ^2.0.0
  archive: ^3.4.0
  image: ^4.1.0
  dynamic_color:
    path: stubs/dynamic_color
  flex_seed_scheme: ^3.4.1
  yaml: ^3.1.3
  shimmer_animation:
    path: stubs/shimmer_animation
  syntax_highlight: ^0.4.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_reorderable_grid_view: ^5.4.0
  sliver_tools: ^0.2.12
  enough_convert: ^1.6.0
  flutter_qjs:
    path: ../../plugins/flutter_qjs
  window_manager:
    path: stubs/window_manager
  photo_view:
    path: stubs/photo_view
  scrollable_positioned_list:
    path: stubs/scrollable_positioned_list
  app_links:
    path: stubs/app_links
  flutter_memory_info:
    path: stubs/flutter_memory_info
  webdav_client:
    git:
      url: https://github.com/venera-app/webdav_client
      ref: 2f669c98fb81cff1c64fee93466a1475c77e4273

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translation.json
    - assets/init.js
    - assets/app_icon.png
    - assets/tags.json
    - assets/tags_tw.json
    - assets/opencc.txt
